<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Back tab — coral, top-left, offset -->
  <rect x="1" y="2" width="8" height="5" rx="1.5" fill="#e8835a" opacity="0.45"/>
  <circle cx="3" cy="4.5" r="1.2" fill="#e8835a" opacity="0.7"/>

  <!-- Middle tab — mint medium, center -->
  <rect x="3" y="5" width="9" height="5" rx="1.5" fill="#3aaa6e" opacity="0.7"/>
  <circle cx="5.5" cy="7.5" r="1.2" fill="#3aaa6e" opacity="0.85"/>
  <rect x="7.5" y="7.2" width="3" height="0.8" rx="0.4" fill="#3aaa6e"/>

  <!-- Front tab — mint, full width, bottom -->
  <rect x="1" y="8" width="13" height="6" rx="1.5" fill="#3aaa6e"/>
  <!-- Favicon circle -->
  <circle cx="3.5" cy="11" r="1.8" fill="#f4f8f5"/>
  <!-- Title line -->
  <rect x="6" y="10.2" width="4.5" height="1.2" rx="0.6" fill="rgba(255,255,255,0.55)"/>
  <!-- Close button dot (top-right of tab) -->
  <circle cx="13" cy="9" r="1" fill="rgba(255,255,255,0.4)"/>
</svg>
