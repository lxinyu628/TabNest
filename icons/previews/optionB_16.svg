<!-- ============================================================
  TabNest Icon — Option B: 巢穴 (Nest)
  Concept: 3个小圆角矩形错落嵌套，中间形成"巢"的负空间
  ============================================================ -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Back tab — top-left, coral -->
  <rect x="1" y="1" width="7" height="6" rx="1.5" fill="#e8835a" opacity="0.5"/>
  <!-- Middle tab — right, mint -->
  <rect x="5" y="4" width="9" height="6" rx="1.5" fill="#3aaa6e" opacity="0.65"/>
  <!-- Front tab — bottom-left, full mint -->
  <rect x="1" y="8" width="14" height="6" rx="2" fill="#3aaa6e"/>
  <!-- Nest gap (negative space between tabs) -->
  <rect x="7.5" y="7" width="2" height="3" rx="1" fill="#f4f8f5"/>
  <!-- Favicon on front tab -->
  <circle cx="3.5" cy="11" r="1.8" fill="#f4f8f5"/>
  <!-- Title line -->
  <rect x="6" y="10.5" width="5" height="1.2" rx="0.6" fill="rgba(255,255,255,0.5)"/>
</svg>
