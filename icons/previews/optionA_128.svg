<!-- ============================================================
  TabNest Icon — Option A: 极简薄荷叶 (128px)
  Concept: 大号薄荷绿 tab，底部中央小凹槽像叶子主脉，白色favicon圆点
  ============================================================ -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background circle — warm white -->
  <circle cx="64" cy="64" r="60" fill="#f4f8f5"/>

  <!-- Main tab body -->
  <rect x="12" y="28" width="104" height="72" rx="12" fill="#3aaa6e"/>

  <!-- Bottom-center notch (leaf vein) -->
  <rect x="54" y="91" width="20" height="12" rx="6" fill="#f4f8f5"/>

  <!-- Favicon circle -->
  <circle cx="36" cy="64" r="16" fill="#f4f8f5"/>
  <!-- Favicon inner dot (gloss) -->
  <circle cx="33" cy="60" r="4" fill="rgba(255,255,255,0.5)"/>

  <!-- Title line 1 -->
  <rect x="60" y="58" width="42" height="10" rx="5" fill="rgba(255,255,255,0.5)"/>
  <!-- Title line 2 -->
  <rect x="60" y="75" width="28" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
  <!-- Close button -->
  <circle cx="109" cy="38" r="7" fill="rgba(255,255,255,0.35)"/>
  <path d="M106 36 112 42M112 36 106 42" stroke="rgba(255,255,255,0.75)" stroke-width="2" stroke-linecap="round"/>
</svg>
