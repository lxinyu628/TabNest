<!-- ============================================================
  TabNest Icon — Option B: 巢穴 Nest (128px)
  Concept: 3个tab错落嵌套，中间形成"巢"的负空间
  ============================================================ -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background -->
  <circle cx="64" cy="64" r="60" fill="#f4f8f5"/>

  <!-- Back tab — top-left, coral -->
  <rect x="14" y="12" width="56" height="40" rx="8" fill="#e8835a" opacity="0.5"/>
  <circle cx="30" cy="32" r="10" fill="#e8835a" opacity="0.7"/>
  <rect x="46" y="28" width="16" height="8" rx="4" fill="#e8835a" opacity="0.5"/>

  <!-- Middle tab — right-mid, mint muted -->
  <rect x="38" y="34" width="70" height="42" rx="8" fill="#3aaa6e" opacity="0.55"/>
  <circle cx="56" cy="55" r="10" fill="#3aaa6e" opacity="0.75"/>
  <rect x="72" y="51" width="22" height="8" rx="4" fill="#3aaa6e" opacity="0.5"/>

  <!-- Front tab — bottom, full mint -->
  <rect x="14" y="62" width="100" height="48" rx="10" fill="#3aaa6e"/>
  <!-- Nest gap (negative space) -->
  <circle cx="64" cy="62" r="16" fill="#f4f8f5"/>
  <!-- Favicon -->
  <circle cx="32" cy="86" r="12" fill="#f4f8f5"/>
  <!-- Title -->
  <rect x="52" y="82" width="38" height="9" rx="4.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="52" y="97" width="24" height="7" rx="3.5" fill="rgba(255,255,255,0.3)"/>
  <!-- Close -->
  <circle cx="106" cy="72" r="6" fill="rgba(255,255,255,0.35)"/>
  <path d="M103.5 70.5 108.5 75M108.5 70.5 103.5 75" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round"/>
</svg>
