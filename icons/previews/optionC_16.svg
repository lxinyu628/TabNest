<!-- ============================================================
  TabNest Icon — Option C: 字母T — 3条水平tab堆叠成"T"字
  ============================================================ -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Top bar of T (wide tab) -->
  <rect x="1" y="1.5" width="14" height="3.5" rx="1.5" fill="#3aaa6e"/>
  <!-- Title lines on top bar -->
  <rect x="3" y="2.6" width="4" height="1.2" rx="0.6" fill="rgba(255,255,255,0.5)"/>
  <rect x="8.5" y="2.6" width="2.5" height="1.2" rx="0.6" fill="rgba(255,255,255,0.3)"/>
  <!-- Stem of T (narrow tab) -->
  <rect x="5.5" y="5" width="5" height="8.5" rx="1.5" fill="#3aaa6e"/>
  <!-- Title line on stem -->
  <rect x="6.5" y="8" width="3" height="1.2" rx="0.6" fill="rgba(255,255,255,0.45)"/>
  <!-- Favicon on stem -->
  <circle cx="8" cy="11.5" r="1.6" fill="#f4f8f5"/>
</svg>
