<!-- ============================================================
  TabNest Icon — Option E: 字母 N — 极简
  Concept: 两竖一折的 N，左边两截竖条=两列标签，折线=连接
  ============================================================ -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Left column: top tab segment -->
  <rect x="2" y="1.5" width="4" height="4" rx="1.5" fill="#e8835a"/>
  <!-- Left column: bottom tab segment -->
  <rect x="2" y="6.5" width="4" height="7" rx="1.5" fill="#3aaa6e"/>
  <!-- Diagonal stroke (the "N" connector) -->
  <path d="M6 3L10 13" stroke="#3aaa6e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right column: top tab -->
  <rect x="10" y="3" width="4" height="11" rx="1.5" fill="#3aaa6e"/>
  <!-- Favicon on left bottom tab -->
  <circle cx="4" cy="11" r="1.5" fill="#f4f8f5"/>
  <!-- Favicon on right tab -->
  <circle cx="12" cy="7" r="1.5" fill="#f4f8f5"/>
</svg>
