<!-- ============================================================
  TabNest Icon — Option A: 极简叶片
  Concept: 整片薄荷绿 tab，底部中间小缺口，像叶子主脉
  ============================================================ -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Main tab — mint green -->
  <rect x="1" y="2.5" width="14" height="11" rx="2.5" fill="#3aaa6e"/>
  <!-- Bottom-center notch (leaf vein detail) -->
  <rect x="6.5" y="13" width="3" height="1.5" rx="0.75" fill="#f4f8f5"/>
  <!-- Favicon circle -->
  <circle cx="4" cy="8" r="2.2" fill="#f4f8f5"/>
  <!-- Title bar placeholder -->
  <rect x="7" y="7" width="5.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.45)"/>
  <!-- Title bar line 2 -->
  <rect x="7" y="9.5" width="3.5" height="1" rx="0.5" fill="rgba(255,255,255,0.25)"/>
</svg>
