<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主背景渐变（薄荷绿） -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5ed698"/>
      <stop offset="100%" stop-color="#2fb36a"/>
    </linearGradient>
    <!-- 珊瑚色，用于小标签 -->
    <linearGradient id="coralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5a96a"/>
      <stop offset="100%" stop-color="#e8835a"/>
    </linearGradient>
    <!-- 暗色，用于阴影 -->
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a6e47" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d4a2c" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- 底板圆角矩形 -->
  <rect x="48" y="48" width="416" height="416" rx="88" ry="88" fill="url(#bgGrad)"/>

  <!-- 大标签主体（主标签/外壳） -->
  <!-- 阴影层 -->
  <path d="M 120 160 L 120 340 Q 120 368 148 368 L 364 368 Q 392 368 392 340 L 392 160 Q 392 132 364 132 L 148 132 Q 120 132 120 160 Z"
        fill="url(#shadowGrad)" transform="translate(0, 12)"/>
  <!-- 主标签体 -->
  <path d="M 120 160 L 120 340 Q 120 368 148 368 L 364 368 Q 392 368 392 340 L 392 160 Q 392 132 364 132 L 148 132 Q 120 132 120 160 Z"
        fill="#ffffff" opacity="0.95"/>

  <!-- 小标签 1 - 左上（珊瑚色） -->
  <rect x="148" y="155" width="130" height="88" rx="12" ry="12" fill="url(#coralGrad)"/>
  <!-- 小标签 1 的小圆点装饰（模拟 URL/内容） -->
  <rect x="160" y="172" width="48" height="6" rx="3" fill="rgba(255,255,255,0.7)"/>
  <rect x="160" y="184" width="80" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="160" y="194" width="60" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- 小标签 1 底部小标签（薄荷绿） -->
  <rect x="162" y="212" width="68" height="22" rx="6" ry="6" fill="#5ed698" opacity="0.9"/>
  <rect x="170" y="219" width="30" height="4" rx="2" fill="rgba(255,255,255,0.7)"/>

  <!-- 小标签 2 - 右下（薄荷绿） -->
  <rect x="230" y="224" width="130" height="88" rx="12" ry="12" fill="#5ed698"/>
  <!-- 小标签 2 装饰线 -->
  <rect x="244" y="242" width="48" height="6" rx="3" fill="rgba(255,255,255,0.7)"/>
  <rect x="244" y="254" width="80" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="244" y="264" width="60" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- 小标签 2 底部小标签（珊瑚色） -->
  <rect x="246" y="282" width="68" height="22" rx="6" ry="6" fill="#f5a96a" opacity="0.9"/>
  <rect x="254" y="289" width="30" height="4" rx="2" fill="rgba(255,255,255,0.7)"/>

  <!-- 小标签 3 - 中间叠加（白色高亮） -->
  <rect x="178" y="180" width="110" height="72" rx="10" ry="10" fill="#ffffff" stroke="rgba(255,255,255,0.6)" stroke-width="2" opacity="0.85"/>
  <!-- 小标签 3 装饰 -->
  <rect x="192" y="198" width="40" height="5" rx="2.5" fill="rgba(94,214,152,0.7)"/>
  <rect x="192" y="208" width="65" height="3" rx="1.5" fill="rgba(0,0,0,0.15)"/>
  <rect x="192" y="216" width="50" height="3" rx="1.5" fill="rgba(0,0,0,0.1)"/>
  <rect x="192" y="224" width="58" height="3" rx="1.5" fill="rgba(0,0,0,0.08)"/>
  <!-- 底部小标签（强调色） -->
  <rect x="194" y="230" width="58" height="16" rx="5" ry="5" fill="#e8835a" opacity="0.85"/>
  <rect x="200" y="235" width="24" height="3" rx="1.5" fill="rgba(255,255,255,0.8)"/>

  <!-- 底部大标签的标签页顶部小条（模拟 URL bar / 地址栏感） -->
  <rect x="120" y="132" width="272" height="20" rx="0" fill="rgba(0,0,0,0.06)"/>

  <!-- 左上角小圆点（模拟标签页图标） -->
  <circle cx="148" cy="148" r="5" fill="#5ed698"/>
  <circle cx="163" cy="148" r="5" fill="#f5a96a"/>
  <circle cx="178" cy="148" r="5" fill="rgba(0,0,0,0.15)"/>
</svg>
