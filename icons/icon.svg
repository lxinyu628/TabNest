<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3ec87c"/>
      <stop offset="100%" stop-color="#1e8a52"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>
  <!-- 三个标签头横排，第一个激活（白色实心），后两个半透明 -->
  <rect x="12" y="28" width="36" height="16" rx="6" fill="white" opacity="0.95"/>
  <rect x="52" y="32" width="30" height="14" rx="6" fill="rgba(255,255,255,0.55)"/>
  <rect x="86" y="34" width="24" height="13" rx="6" fill="rgba(255,255,255,0.3)"/>
  <!-- 主内容区 -->
  <rect x="12" y="44" width="104" height="56" rx="10" fill="white" opacity="0.9"/>
  <!-- 内容区里三列色块，代表分组 -->
  <rect x="22" y="56" width="24" height="6" rx="3" fill="#3aaa6e" opacity="0.3"/>
  <rect x="22" y="66" width="18" height="5" rx="2.5" fill="#3aaa6e" opacity="0.2"/>
  <rect x="54" y="56" width="24" height="6" rx="3" fill="#3aaa6e" opacity="0.3"/>
  <rect x="54" y="66" width="16" height="5" rx="2.5" fill="#3aaa6e" opacity="0.2"/>
  <rect x="86" y="56" width="20" height="6" rx="3" fill="#3aaa6e" opacity="0.2"/>
  <rect x="86" y="66" width="14" height="5" rx="2.5" fill="#3aaa6e" opacity="0.15"/>
</svg>
