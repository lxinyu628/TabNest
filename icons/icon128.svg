<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background circle for 128px -->
  <circle cx="64" cy="64" r="60" fill="#f4f8f5"/>

  <!-- Back tab — coral, muted, top-left -->
  <rect x="12" y="18" width="58" height="36" rx="8" fill="#e8835a" opacity="0.4"/>
  <!-- Back tab favicon -->
  <rect x="22" y="29" width="14" height="14" rx="4" fill="#e8835a" opacity="0.65"/>
  <!-- Back tab title line -->
  <rect x="42" y="32" width="18" height="8" rx="4" fill="#e8835a" opacity="0.4"/>
  <!-- Back tab close dot -->
  <circle cx="63" cy="27" r="4" fill="#e8835a" opacity="0.35"/>

  <!-- Middle tab — mint medium, center -->
  <rect x="30" y="36" width="66" height="38" rx="8" fill="#3aaa6e" opacity="0.6"/>
  <!-- Middle tab favicon -->
  <rect x="42" y="48" width="14" height="14" rx="4" fill="#3aaa6e" opacity="0.8"/>
  <!-- Middle tab title line -->
  <rect x="64" y="50" width="22" height="9" rx="4.5" fill="#3aaa6e" opacity="0.55"/>
  <!-- Middle tab close dot -->
  <circle cx="88" cy="45" r="4" fill="#3aaa6e" opacity="0.45"/>

  <!-- Front tab — mint, full-width, bottom-anchored -->
  <rect x="12" y="62" width="100" height="50" rx="10" fill="#3aaa6e"/>
  <!-- Front tab favicon (white circle like a real tab) -->
  <circle cx="32" cy="87" r="10" fill="#f4f8f5"/>
  <!-- Front tab title line (text placeholder) -->
  <rect x="50" y="81" width="36" height="10" rx="5" fill="rgba(255,255,255,0.5)"/>
  <!-- Front tab subtitle line -->
  <rect x="50" y="96" width="22" height="7" rx="3.5" fill="rgba(255,255,255,0.3)"/>
  <!-- Front tab close button (×) -->
  <circle cx="103" cy="73" r="6.5" fill="rgba(255,255,255,0.35)"/>
  <path d="M100.5 71.5 105.5 75M105.5 71.5 100.5 75" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
